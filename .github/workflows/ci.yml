name: CI

on:
  pull_request:
    branches: [develop, main]
  workflow_call:

jobs:
  ci:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        id: setup-python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        uses: snok/install-poetry@76e04a911780d5b312d89783f7b1cd627778900a # v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-py${{ steps.setup-python.outputs.python-version }}-poetry-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libegl1

      - name: Check version sync
        run: |
          PYPROJECT_VERSION=$(poetry version -s)
          INIT_VERSION=$(python -c "import re; print(re.search(r'__version__\s*=\s*\"(.+?)\"', open('src/backlog_manager/__init__.py').read()).group(1))")
          if [ "$PYPROJECT_VERSION" != "$INIT_VERSION" ]; then
            echo "::error::Version mismatch: pyproject.toml=$PYPROJECT_VERSION vs __init__.py=$INIT_VERSION"
            exit 1
          fi

      - name: Lint
        run: |
          poetry run ruff check src
          poetry run ruff format --check src tests
          poetry run mypy src

      - name: Test with coverage
        run: |
          poetry run pytest tests/unit tests/integration \
            -m "not slow" \
            --cov=src/backlog_manager \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 1

  quality:
    name: Quality
    needs: ci
    if: >-
      github.event_name == 'workflow_call' ||
      github.ref == 'refs/heads/develop' ||
      github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Download coverage artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: coverage-report

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

      - name: SonarCloud Scan
        if: github.ref == 'refs/heads/main'
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602 # v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: SonarCloud Quality Gate check
        if: github.ref == 'refs/heads/main'
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b # v1.2.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
