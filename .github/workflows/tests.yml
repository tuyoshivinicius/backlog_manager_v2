name: Tests

on:
  push:
    branches: [main, master, "001-*", "0*"]
  pull_request:
    branches: [main, master, "001-*"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            ${{ runner.os }}-poetry-

      - name: Install dependencies
        run: poetry install --with dev

      - name: Install xvfb and Qt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            xvfb \
            libxkbcommon-x11-0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-xinerama0 \
            libxcb-xfixes0 \
            libxcb-cursor0 \
            libegl1-mesa \
            libgl1-mesa-glx \
            libopengl0 \
            libxcb-shape0

      - name: Run unit tests
        run: |
          poetry run pytest tests/unit/ -v --tb=short

      - name: Run integration tests
        run: |
          poetry run pytest tests/integration/ -v --tb=short

      - name: Run E2E tests with xvfb
        run: |
          xvfb-run -a poetry run pytest tests/e2e/ \
            -v \
            --tb=short \
            -m "not slow" \
            --timeout=60

      - name: Run tests with coverage
        run: |
          xvfb-run -a poetry run pytest \
            --cov=src/backlog_manager \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -v \
            --tb=short \
            -m "not slow"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          verbose: true

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      - name: Cache Poetry dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pypoetry
            .venv
          key: ${{ runner.os }}-poetry-${{ hashFiles('poetry.lock') }}

      - name: Install dependencies
        run: poetry install --with dev

      - name: Run ruff check
        run: poetry run ruff check src tests

      - name: Run ruff format check
        run: poetry run ruff format --check src tests

      - name: Run mypy
        run: poetry run mypy src
