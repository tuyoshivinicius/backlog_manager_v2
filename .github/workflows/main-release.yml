name: Main Release

on:
  push:
    branches: [main]

concurrency:
  group: main-release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml
    secrets: inherit

  release:
    name: Release
    needs: ci
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      released: ${{ steps.release.outputs.released }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.13"

      - name: Install python-semantic-release
        run: pip install python-semantic-release

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run semantic-release
        id: release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Running semantic-release ==="
          OUTPUT=$(semantic-release version 2>&1) || true
          echo "$OUTPUT"

          TAG=$(git describe --tags --exact-match HEAD 2>/dev/null || true)
          if [ -n "$TAG" ]; then
            echo "Tag found locally: $TAG"
            echo "Pushing commit and tag to remote..."
            git push origin HEAD:refs/heads/main
            git push origin "$TAG"
            VERSION="${TAG#v}"
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "released=true" >> "$GITHUB_OUTPUT"
          else
            echo "No tag found on HEAD — nothing to release"
            echo "version=" >> "$GITHUB_OUTPUT"
            echo "tag=" >> "$GITHUB_OUTPUT"
            echo "released=false" >> "$GITHUB_OUTPUT"
          fi

  dispatch-publish:
    name: Dispatch Publish
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish.yml \
            --repo "${{ github.repository }}" \
            --ref "${{ needs.release.outputs.tag }}" \
            -f confirm=yes

  backmerge:
    name: Backmerge to Develop
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Create backmerge PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.release.outputs.version }}
        run: |
          EXISTING=$(gh pr list --head main --base develop --json number --jq '.[0].number')
          if [ -z "$EXISTING" ]; then
            gh pr create \
              --title "chore: backmerge v$VERSION" \
              --body "Automatic backmerge of release v$VERSION from main to develop" \
              --head main \
              --base develop
          fi
